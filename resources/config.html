<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Pebble Settings</title>
  <style>
    :root {
      --ink: #31263e;
      --muted: #766b83;
      --paper: #fffdfb;
      --line: #eadfe8;
      --pink: #ff7f9a;
      --coral: #ff9f7a;
      --mint: #4fc3a1;
      --blue: #4f8ddf;
      --red: #df5b66;
      --shadow: 0 10px 24px rgba(94, 62, 85, 0.14);
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 18px 16px 28px;
      background:
        radial-gradient(circle at 18px 18px, rgba(255, 127, 154, 0.22) 0 6px, transparent 7px),
        radial-gradient(circle at calc(100% - 26px) 72px, rgba(79, 195, 161, 0.20) 0 8px, transparent 9px),
        linear-gradient(180deg, #fff3f6 0%, #f8fff9 56%, #fffaf1 100%);
      color: var(--ink);
      max-width: 400px;
      margin: 0 auto;
      min-height: 100vh;
    }
    h1 {
      font-size: 24px;
      line-height: 1.15;
      margin: 4px 0 18px;
      letter-spacing: 0;
      color: var(--ink);
    }
    h1::after {
      content: "";
      display: block;
      width: 54px;
      height: 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--pink), var(--coral), var(--mint));
      margin-top: 10px;
    }
    .section {
      position: relative;
      background: rgba(255, 253, 251, 0.94);
      border-radius: 8px;
      border: 1px solid rgba(234, 223, 232, 0.95);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--pink), var(--coral), var(--mint));
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--ink);
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-sizing: border-box;
      margin-bottom: 13px;
      font-size: 14px;
      background: white;
      color: var(--ink);
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255, 127, 154, 0.18);
    }
    label input[type="checkbox"] {
      width: auto;
      margin-right: 8px;
    }
    .api-key-status {
      color: #23795f;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 9px;
    }
    .provider-info {
      background: #fff6df;
      border: 1px solid #f2dfad;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      color: #5c4a1f;
    }
    .provider-info p {
      margin: 4px 0;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      color: white;
      box-shadow: 0 6px 14px rgba(49, 38, 62, 0.14);
      transition: transform 120ms ease, box-shadow 120ms ease, filter 120ms ease;
    }
    button:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(49, 38, 62, 0.16);
      filter: brightness(0.98);
    }
    .save-btn {
      background: linear-gradient(135deg, var(--pink), var(--coral));
    }
    .delete-btn {
      background: var(--red);
    }
    .reset-btn {
      background: #77628d;
    }
    .link-btn {
      background: #ffffff;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .advanced-toggle {
      color: #9d4560;
      text-decoration: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      display: inline-block;
    }
    .advanced-toggle::before {
      content: "+ ";
      color: var(--pink);
    }
    .advanced {
      display: none;
      margin-top: 12px;
    }
    .advanced.visible {
      display: block;
    }
    .note {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>Ask Pebble Settings</h1>
  
  <div class="section">
    <label for="apiKey">OpenRouter API key</label>
    <div id="apiKeyStatus" class="api-key-status" style="display:none;">OpenRouter API key saved</div>
    <input type="text" id="apiKey" placeholder="Enter your OpenRouter API key">
    
    <div class="provider-info">
      <p><strong>Provider:</strong> OpenRouter</p>
      <p><strong>Routing:</strong> Model-specific</p>
      <p><strong>Speed route:</strong> Groq only</p>
    </div>
    
    <label for="language">Language</label>
    <select id="language">
      <option value="Auto" selected>Auto</option>
      <option value="Japanese">Japanese</option>
      <option value="English">English</option>
      <option value="Chinese (Simplified)">Chinese (Simplified)</option>
      <option value="Chinese (Traditional)">Chinese (Traditional)</option>
      <option value="Korean">Korean</option>
      <option value="Spanish">Spanish</option>
      <option value="French">French</option>
      <option value="German">German</option>
      <option value="Portuguese">Portuguese</option>
      <option value="Italian">Italian</option>
      <option value="Russian">Russian</option>
      <option value="Arabic">Arabic</option>
      <option value="Hindi">Hindi</option>
    </select>
    <p class="note">Language controls AI answers, not Pebble voice recognition.</p>

    <label for="systemInstruction">System instruction</label>
    <textarea id="systemInstruction" rows="3" placeholder="Optional custom instruction"></textarea>

    <label>
      <input type="checkbox" id="includeTimeContext">
      Include time context
    </label>
    <label>
      <input type="checkbox" id="includeLocationContext">
      Include location context
    </label>
    <label>
      <input type="checkbox" id="includeHealthContext">
      Include health context
    </label>
    <p class="note">Location and health are used only when the model asks for them.</p>
    
    <label for="model">Recommended model</label>
    <select id="model">
      <option value="openai/gpt-oss-20b" selected>Speed (Groq GPT-OSS 20B)</option>
      <option value="openai/gpt-5-mini">Balance (GPT-5 Mini)</option>
      <option value="anthropic/claude-haiku-4.5">Quality (Claude Haiku 4.5)</option>
    </select>
    
    <button class="link-btn" onclick="window.open('https://openrouter.ai/settings/keys', '_blank')">Create OpenRouter API key</button>
    <button class="link-btn" onclick="window.open('https://openrouter.ai/settings/credits', '_blank')">Check credits / usage</button>
    <button class="delete-btn" onclick="deleteApiKey()">Delete OpenRouter API key</button>
    <button class="reset-btn" onclick="resetMemory()">Reset conversation memory</button>
  </div>
  
  <div class="section">
    <span class="advanced-toggle" onclick="toggleAdvanced()">Advanced settings</span>
    <div class="advanced" id="advancedSection">
      <label for="customModelId">Custom model id</label>
      <input type="text" id="customModelId" placeholder="Optional: override dropdown model">
      <div id="customModelStatus" style="display:none; color:#1976d2; font-size:13px; margin-bottom:8px;">Using custom model</div>
      
      <label for="maxOutputTokens">Max output tokens</label>
      <select id="maxOutputTokens">
        <option value="128">128</option>
        <option value="300" selected>300</option>
        <option value="512">512</option>
      </select>
      
      <label for="memoryDepth">Memory depth</label>
      <select id="memoryDepth">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
      </select>
      
      <label for="timeoutSeconds">Timeout seconds</label>
      <input type="number" id="timeoutSeconds" min="8" max="20" value="12">
    </div>
  </div>
  
  <button class="save-btn" onclick="save()">Save</button>
  
  <script>
    // Load settings from URL hash or query
    var settings = {};
    try {
      var hash = window.location.hash.substring(1);
      if (hash) {
        settings = JSON.parse(decodeURIComponent(hash));
      }
    } catch (e) {
      console.log('No initial settings');
    }
    
    // Populate fields
    if (settings.apiKey) {
      document.getElementById('apiKeyStatus').style.display = 'block';
    }
    if (settings.language) document.getElementById('language').value = settings.language;
    if (settings.model) document.getElementById('model').value = settings.model;
    if (settings.customModelId) {
      document.getElementById('customModelId').value = settings.customModelId;
      document.getElementById('customModelStatus').style.display = 'block';
    }
    if (settings.systemInstruction) document.getElementById('systemInstruction').value = settings.systemInstruction;
    document.getElementById('includeTimeContext').checked = settings.includeTimeContext !== false;
    document.getElementById('includeLocationContext').checked = settings.includeLocationContext === true;
    document.getElementById('includeHealthContext').checked = settings.includeHealthContext === true;
    if (settings.maxOutputTokens) document.getElementById('maxOutputTokens').value = settings.maxOutputTokens;
    if (settings.memoryDepth) document.getElementById('memoryDepth').value = settings.memoryDepth;
    if (settings.timeoutSeconds) document.getElementById('timeoutSeconds').value = settings.timeoutSeconds;
    
    function toggleAdvanced() {
      var section = document.getElementById('advancedSection');
      section.classList.toggle('visible');
    }
    
    var apiKeyDeletedFlag = false;
    var memoryResetFlag = false;

    function deleteApiKey() {
      if (confirm('Delete your OpenRouter API key and conversation memory?')) {
        apiKeyDeletedFlag = true;
        memoryResetFlag = true;
        document.getElementById('apiKey').value = '';
        document.getElementById('apiKeyStatus').style.display = 'none';
      }
    }
    
    function resetMemory() {
      memoryResetFlag = true;
      alert('Memory reset');
    }
    
    function save() {
      var resetFlag = memoryResetFlag;
      memoryResetFlag = false;
      var apiKeyValue = document.getElementById('apiKey').value.trim();
      var deleteFlag = apiKeyDeletedFlag && !apiKeyValue;
      apiKeyDeletedFlag = false;
      var newSettings = {
        apiKey: apiKeyValue,
        apiKeyDeleted: deleteFlag,
        language: document.getElementById('language').value,
        model: document.getElementById('model').value,
        customModelId: document.getElementById('customModelId').value.trim(),
        systemInstruction: document.getElementById('systemInstruction').value.trim(),
        includeTimeContext: document.getElementById('includeTimeContext').checked,
        includeLocationContext: document.getElementById('includeLocationContext').checked,
        includeHealthContext: document.getElementById('includeHealthContext').checked,
        maxOutputTokens: document.getElementById('maxOutputTokens').value,
        memoryDepth: document.getElementById('memoryDepth').value,
        timeoutSeconds: document.getElementById('timeoutSeconds').value,
        memoryReset: resetFlag
      };
      
      // Return to Pebble app
      window.location.href = 'pebblejs://close#' + encodeURIComponent(JSON.stringify(newSettings));
    }
  </script>
</body>
</html>
